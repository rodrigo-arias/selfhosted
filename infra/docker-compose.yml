name: infra

networks:
  proxy:
    external: true   # Connect to the same proxy network for NPM access

services:
  # --- Nginx Proxy Manager: reverse proxy + UI for domain mapping
  npm:
    image: jc21/nginx-proxy-manager:latest
    container_name: npm
    restart: unless-stopped
    ports:
      - "80:80"     # HTTP
      - "443:443"   # HTTPS
      - "81:81"     # Admin UI
    volumes:
      - ${APPDATA_ROOT}/infra/npm/data:/data
      - ${APPDATA_ROOT}/infra/npm/letsencrypt:/etc/letsencrypt
    environment:
      TZ: ${TZ}
    networks: [proxy]

  # --- Pi-hole: DNS server + ad/tracker blocking
  pihole:
    image: pihole/pihole:latest
    container_name: pihole
    restart: unless-stopped
    ports:
      - "${LAN_IP}:53:53/tcp"    # DNS (TCP)
      - "${LAN_IP}:53:53/udp"    # DNS (UDP)
    environment:
      TZ: ${TZ}
      DNSMASQ_LISTENING: "all"    # Listen on all interfaces (Docker/LAN)
      FTLCONF_misc_dnsmasq_lines: "address=/${DOMAIN}/${LAN_IP};local=/${DOMAIN}/"
    volumes:
      - ${APPDATA_ROOT}/infra/pihole/etc-pihole:/etc/pihole
      - ${APPDATA_ROOT}/infra/pihole/etc-dnsmasq.d:/etc/dnsmasq.d
    networks: [proxy]

  # --- Uptime Kuma: monitor uptime and Internet connectivity
  uptime-kuma:
    image: louislam/uptime-kuma:latest
    container_name: uptime-kuma
    restart: unless-stopped
    dns:
      - "${LAN_IP}"   # Pi-hole DNS server
    expose:
      - "3001"   # Web UI (proxied through NPM)
    volumes:
      - ${APPDATA_ROOT}/infra/uptime-kuma/data:/app/data
    environment:
      TZ: ${TZ}
    networks: [proxy]

  # --- Homepage: dashboard at the apex domain
  homepage:
    image: ghcr.io/gethomepage/homepage:latest
    container_name: homepage
    restart: unless-stopped
    expose:
      - "3000"   # Web UI (proxied through NPM)
    volumes:
      - ${APPDATA_ROOT}/infra/homepage/config:/app/config
      - /var/run/docker.sock:/var/run/docker.sock:ro
    environment:
      TZ: ${TZ}
      HOMEPAGE_ALLOWED_HOSTS: ${DOMAIN}
    networks: [proxy]

  # --- Ntfy: self-hosted push notifications
  ntfy:
    image: binwiederhier/ntfy:latest
    container_name: ntfy
    restart: unless-stopped
    command: serve
    ports:
      - "8090:80"   # Direct access for CLI clients
    expose:
      - "80"   # Web UI + API (proxied through NPM)
    volumes:
      - ${APPDATA_ROOT}/infra/ntfy/etc:/etc/ntfy
      - ${APPDATA_ROOT}/infra/ntfy/cache:/var/cache/ntfy
    environment:
      TZ: ${TZ}
    networks: [proxy]

  # --- Cloudflared: outbound tunnel to Cloudflare
  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: cloudflared
    restart: unless-stopped
    command: tunnel --no-autoupdate run
    environment:
      TUNNEL_TOKEN: ${CLOUDFLARE_TUNNEL_TOKEN}
    networks: [proxy]
